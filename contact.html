<!DOCTYPE html>

<head>

    <!-- Google Fonts -->

    <!-- Phosphor Icons -->

<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <a href="index.html" class="logo">SHUNYA.</a>
        <div class="nav-links">
            <a href="track.html">Track Order</a>
            <span class="separator">|</span>

    </nav>

    <main class="main-container center-content" style="padding-top: 2rem;">
        <h2 style="font-size: 2.5rem; margin-bottom: 2rem;">Let's Work Together</h2>

        <div class="product-card" style="width: 100%; max-width: 500px; padding: 2.5rem 2rem;">
            <p style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-main); text-align: center;">
                Have a question or looking to collaborate? Reach out!
            </p>
            <form action="mailto:anayanimesh@gmail.com" method="GET" enctype="text/plain" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" name="subject" placeholder="Name or Subject" class="input-field" required>
                <textarea name="body" placeholder="Message" class="input-field" rows="4" required></textarea>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem; cursor: pointer;">
                    Send Email <i class="ph-bold ph-paper-plane-right"></i>
                </button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Or email directly at <a href="mailto:anayanimesh@gmail.com" class="highlight" style="text-decoration: none;">anayanimesh@gmail.com</a>
            </p>
        </div>
    </main>
