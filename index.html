<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUNYA.</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Slow Load Fallback message -->
    <div id="slow-load-banner"
        style="display: none; background-color: #fff3cd; color: #856404; text-align: center; padding: 12px 20px; font-family: 'Outfit', sans-serif; position: fixed; top: 0; left: 0; width: 100%; z-index: 10000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 0.9rem;">
        Experiencing a slow connection? You can order directly! <br>
        Call: <a href="tel:+919310181962"
            style="font-weight: 700; color: #856404; text-decoration: underline;">9310181962</a> or
        WhatsApp: <a href="https://wa.me/918440975794"
            style="font-weight: 700; color: #25D366; text-decoration: underline;">8440975794</a>
        <button onclick="document.getElementById('slow-load-banner').style.display='none'"
            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #856404;">&times;</button>
    </div>
    <script>
        // Display the message if the page hasn't finished loading in 4 seconds
        const slowLoadTimer = setTimeout(() => {
            if (document.readyState !== 'complete') {
                document.getElementById('slow-load-banner').style.display = 'block';
            }
        }, 4000);

        // Hide message when fully loaded and clear the timer
        window.addEventListener('load', () => {
            clearTimeout(slowLoadTimer);
            document.getElementById('slow-load-banner').style.display = 'none';
        });
    </script>

    <!-- Top Navigation -->
    <nav class="navbar">
        <a href="#" class="logo">SHUNYA.</a>
        <div class="nav-links">
            <a href="track.html">Track Order</a>
            <span class="separator">|</span>
            <a href="about.html">About us</a>
            <span class="separator">|</span>
            <a href="contact.html">Contact us</a>
        </div>
    </nav>

    <main class="main-container">

        <!-- Cards Flex/Grid Section -->
        <div class="cards-grid">

            <!-- Card 1 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1603033172872-c2525115c7b9?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bWFnZ2l8ZW58MHx8MHx8fDA%3D"
                    alt="Maggi" class="card-image">
                <div class="card-info">
                    <h3 style="display: flex; justify-content: space-between; align-items: center;">
                        Maggi <span
                            style="font-size: 1.25rem; color: var(--text-muted); font-weight: normal;">₹50</span>
                    </h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">(Labour charges
                        included)</p>
                </div>
                <div class="card-actions">
                    <button class="btn btn-outline">Customize</button>
                    <button class="btn btn-primary">Add to cart</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1760192716247-382af2aa9b35?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fHN1bm55JTIwc2lkZSUyMHVwJTIwZWdnfGVufDB8fDB8fHww"
                    alt="Sunny Side Up" class="card-image">
                <div class="card-info">
                    <h3 style="display: flex; justify-content: space-between; align-items: center;">
                        Sunny side up <span
                            style="font-size: 1.25rem; color: var(--text-muted); font-weight: normal;">₹20</span>
                    </h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">(Labour charges
                        included)</p>
                </div>
                <!-- Replicating sketch: empty box + 'add' -->
                <div class="card-actions">
                    <button class="btn btn-outline">Customize</button>
                    <button class="btn btn-primary">Add to cart</button>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="product-card">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjmPU190weYegGU-VymxkIUDrPgYvgGfFNRZL3e4xhteL9YnG6hWxgyI5hEjOyP0SiYYUPHlubrQbCg_sxDjue7PpvD70yZaprf4nLZKIbsNKNikRs6MWqR-ciGYHuUp0hqnUppvDdR3r8/s1600/bread+omelette2.jpg"
                    alt="Bread Omelette" class="card-image">
                <div class="card-info">
                    <h3 style="display: flex; justify-content: space-between; align-items: center;">
                        Bread omelette <span
                            style="font-size: 1.25rem; color: var(--text-muted); font-weight: normal;">₹60</span>
                    </h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">(Labour charges
                        included)</p>
                </div>
                <!-- Replicating sketch: two empty boxes -->
                <div class="card-actions">
                    <button class="btn btn-outline">Customize</button>
                    <button class="btn btn-primary">Add to cart</button>
                </div>
            </div>

        </div>

        <!-- Float Right Proceed Button -->
        <div class="bottom-actions">
            <button class="btn btn-proceed">
                Proceed <i class="ph-bold ph-arrow-right"></i>
            </button>
        </div>

    </main>

    <!-- Customize Modal -->
    <div class="payment-modal" id="customize-modal">
        <div class="modal-content product-card" style="border-radius: 15px 255px 15px 225px / 255px 15px 225px 15px;">
            <button class="close-modal" id="close-customize-modal">&times;</button>
            <h2 id="customize-title" style="margin-bottom: 1.5rem; font-size: 2rem;">Customize Dish</h2>
            <div id="customize-options" class="payment-option" style="margin:0;">
                <!-- dynamically populated -->
            </div>
            <button class="btn btn-primary" id="save-customization" style="margin-top: 1.5rem; width: 100%;">Save
                Adjustments</button>
        </div>
    </div>

    <!-- Custom Interactivity -->
    <script type="module" src="script.js"></script>
</body>

</html>
